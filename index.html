<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RJ45 as a Service</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Cloud Networking Simulator</h1>
        <p>Because you can't ping AWS until you plug it in.</p>
        
        <div class="network-setup">
            <div class="port">
                <div class="led left-led" id="led-link"></div>
                <div class="led right-led" id="led-act"></div>
                <div class="pins"></div>
            </div>

            <div class="cable" id="ethernet-cable">
                <div class="clip"></div>
                <div class="connector"></div>
                <div class="wire"></div>
            </div>
        </div>

        <button id="plug-btn">Insert Cable</button>
    </div>

    <audio id="click-sound" src="click.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
