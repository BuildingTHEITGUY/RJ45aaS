<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RJ45 as a Service</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="racks-container">
        <div class="rack left-rack">
            <div class="server cisco"><div class="tiny-led blink-fast"></div><div class="tiny-led"></div></div>
            <div class="server fortigate"><div class="tiny-led"></div><div class="tiny-led blink-slow"></div></div>
            <div class="server generic"><div class="tiny-led blink-fast"></div></div>
        </div>
        <div class="rack right-rack">
            <div class="server paloalto"><div class="tiny-led blink-slow"></div><div class="tiny-led"></div></div>
            <div class="server juniper"><div class="tiny-led blink-fast"></div><div class="tiny-led blink-slow"></div></div>
            <div class="server generic"><div class="tiny-led"></div></div>
        </div>
    </div>

    <div class="container">
        <div class="header-text">
            <h1>RJ45 as a Service 🔌</h1>
            <p>The missing tactile feedback of modern cloud infrastructure.<br><em>Because clicking a mouse will never feel as good as seating Cat6.</em></p>
        </div>

        <div class="network-setup">
            <div class="port">
                <div class="led left-led" id="led-link"></div>
                <div class="led right-led" id="led-act"></div>
                <div class="pins"></div>
            </div>
            
            <div class="cable" id="ethernet-cable">
                <div class="clip"></div>
                <div class="connector"></div>
                <div class="wire"></div>
            </div>
        </div>

        <button id="plug-btn">Insert Cable</button>
    </div>

    <audio id="click-sound" src="click.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
